version: '3.8'

services:
  database:
    image: postgres:16-alpine
    container_name: fashiontrack_db
    restart: always
    environment:
      POSTGRES_DB: Fashinotrack_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 112233
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Montar scripts en orden numérico para asegurar creación de esquema antes de datos de prueba
      - ./database/FashionTrack_DB.sql:/docker-entrypoint-initdb.d/01-FashionTrack_DB.sql
      - ./database/datos_prueba.sql:/docker-entrypoint-initdb.d/02-datos_prueba.sql
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fashiontrack_backend
    restart: always
    depends_on:
      - database
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/Fashinotrack_DB
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=112233
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    ports:
      - "8080:8080"
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fashiontrack_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
